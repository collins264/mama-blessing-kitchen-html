<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mama Blessing Kitchen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #fff8f0; color: #333; }
    header { background: #e63946; color: white; text-align: center; padding: 20px; }
    header h1 { font-size: 28px; }
    .menu { padding: 20px; text-align: center; }
    .menu h2 { color: #e63946; margin-bottom: 15px; }
    .food { background: white; margin: 10px auto; padding: 15px; border-radius: 10px; max-width: 400px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .order { padding: 20px; background: #ffe5d9; }
    .order h2 { text-align: center; color: #e63946; margin-bottom: 15px; }
    form { max-width: 400px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
    input, select, textarea, button { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    button { background: #25D366; color: white; border: none; font-weight: bold; cursor: pointer; }
    button:hover { background: #1ebe5b; }
    footer { text-align: center; padding: 15px; background: #e63946; color: white; margin-top: 20px; }
  </style>
</head>
<body>

  <header>
    <h1>🍲 Mama Blessing Kitchen</h1>
    <p>Authentic Nigerian Food Delivered to You</p>
  </header>

  <section class="menu">
    <h2>Our Menu</h2>
    <div class="food">
      <h3>Jollof Rice + Chicken</h3>
      <p>₦3,500</p>
    </div>
    <div class="food">
      <h3>Egusi Soup + Pounded Yam</h3>
      <p>₦4,000</p>
    </div>
    <div class="food">
      <h3>Pepper Soup</h3>
      <p>₦3,000</p>
    </div>
  </section>

  <section class="order">
    <h2>Place Your Order</h2>
    <form id="orderForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="text" id="address" placeholder="Delivery Address" required>
      <select id="food">
        <option>Jollof Rice + Chicken</option>
        <option>Egusi Soup + Pounded Yam</option>
        <option>Pepper Soup</option>
      </select>
      <textarea id="note" placeholder="Extra Note"></textarea>
      <button type="submit">Order on WhatsApp</button>
    </form>
  </section>

  <footer>
    <p>© 2026 Mama Blessing Kitchen | Call/WhatsApp: 08139320756</p>
  </footer>

  <script>
    document.getElementById('orderForm').addEventListener('submit', function(e) {
      e.preventDefault();
      let name = document.getElementById('name').value;
      let address = document.getElementById('address').value;
      let food = document.getElementById('food').value;
      let note = document.getElementById('note').value;
      
      let message = `Hello Mama Blessing Kitchen!%0A%0AName: ${name}%0AFood: ${food}%0AAddress: ${address}%0ANote: ${note}`;
      let whatsappUrl = `https://wa.me/2348139320756?text=${message}`;
      
      window.open(whatsappUrl, '_blank');
    });
  </script>

</body>
</html>
