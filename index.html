<!DOCTYPE html>
<html>
<head>
  <title>Mama Blessing's Kitchen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #FFF8F0;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #D35400;
    }
    h2 {
      color: #D35400;
      border-bottom: 2px solid #FDEBD0;
      padding-bottom: 5px;
    }
    .menu-item {
      margin-bottom: 25px;
      text-align: center;
    }
    .menu-item img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .price {
      font-weight: bold;
      color: #27AE60;
      font-size: 18px;
    }
    label {
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .whatsapp-btn {
      background: #25D366;
      color: white;
      padding: 15px;
      text-decoration: none;
      border-radius: 10px;
      display: block;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      margin-top: 10px;
    }
    .whatsapp-btn:hover {
      background: #1EBE5A;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Mama Blessing's Kitchen</h1>
  <p style="text-align:center;">Authentic Nigerian Food Made With Love ❤️</p>

  <h2>Our Menu</h2>

  <div class="menu-item">
    <img src="IMG-20260713-WA3897.jpg">
    <p><b>Pounded Yam & Efo Soup</b></p>
    <p class="price">₦3,500</p>
  </div>

  <div class="menu-item">
    <img src="IMG-20260713-WA2747.jpg">
    <p><b>Jollof Rice + Chicken</b></p>
    <p class="price">₦2,500</p>
  </div>

  <div class="menu-item">
    <img src="IMG-20260713-WA5976.jpg">
    <p><b>Fried Rice + Chicken</b></p>
    <p class="price">₦2,500</p>
  </div>

  <h2>Order Now</h2>
  <form>
    <label>Select Food:</label>
    <select name="food">
      <option>Pounded Yam & Efo Soup - ₦3,500</option>
      <option>Jollof Rice + Chicken - ₦2,500</option>
      <option>Fried Rice + Chicken - ₦2,500</option>
    </select>

    <label>Your Name:</label>
    <input type="text" name="name">

    <label>Your Address:</label>
    <input type="text" name="address">

    <a href="https://wa.me/2348139320756?text=Hello%20Mama%20Blessing,%20I%20want%20to%20order:" 
       class="whatsapp-btn">
       📱 Order on WhatsApp
    </a>
  </form>
</div>

</body>
</html>
